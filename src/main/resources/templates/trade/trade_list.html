<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>굿즈거래 | 더쿠쿠</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 🔥 WebSocket 라이브러리 (채팅이랑 동일) -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <style>
        :root {
            --purple: #6366f1;
            --purple-deep: #4f46e5;
            --bg-soft: #f5f3ff;
            --card-bg: #ffffff;
            --border: #e5e7eb;
            --text-main: #111827;
            --text-sub: #6b7280;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-soft);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* ===== 상단 헤더 ===== */
        .trade-header {
            position: sticky;
            top: 0;
            z-index: 20;
            background: white;
            padding: 16px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--purple);
        }

        .header-title {
            font-size: 15px;
            font-weight: 700;
            margin-left: 6px;
            color: var(--text-main);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ===== 검색 영역 (예전 카테고리 자리에) ===== */
        .trade-filter {
            background: white;
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
        }

        .trade-search-form {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .trade-search-input {
            flex: 1;
            border-radius: 999px;
            border: 1px solid var(--border);
            padding: 9px 14px;
            font-size: 13px;
            outline: none;
        }

        .trade-search-input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 1px rgba(99,102,241,0.18);
        }

        .trade-search-button {
            border-radius: 999px;
            border: none;
            background: var(--purple);
            color: white;
            padding: 0 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .trade-search-button:hover {
            background: var(--purple-deep);
        }

        /* ===== 리스트 카드 ===== */
        .trade-list {
            padding: 12px 18px 40px;
        }

        .trade-card {
            background: var(--card-bg);
            border-radius: 14px;
            display: flex;
            gap: 12px;
            padding: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .trade-card + .trade-card {
            margin-top: 10px;
        }

        .trade-thumb {
            width: 95px;
            height: 95px;
            border-radius: 10px;
            background: #eee;
            object-fit: cover;
        }

        .trade-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .trade-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .trade-meta {
            font-size: 12px;
            color: var(--text-sub);
        }

        /* 채팅/찜/조회 숫자 라인 */
        .trade-stats {
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-sub);
        }

        .trade-price {
            font-size: 15px;
            font-weight: 700;
            color: var(--purple);
            margin-top: 6px;
        }

        /* ===== 글쓰기 floating 버튼 ===== */
        .write-btn {
            position: fixed;
            bottom: 90px;
            right: 20px;
            background: var(--purple);
            color: white;
            padding: 14px 22px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            cursor: pointer;
            z-index: 30;
            border: none;
            text-decoration: none;
        }

        .write-btn:hover {
            background: var(--purple-deep);
        }

        /* ===== 하단 네비게이션 ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: #ffffff;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.12);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            z-index: 50;
        }

        .nav-item {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            text-decoration: none;
            color: var(--text-sub);
            border-right: 1px solid var(--border);
        }

        .nav-item:last-child {
            border-right: none;
        }

        .nav-item .icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: var(--purple);
            font-weight: 700;
        }

        .badge {
            position: absolute;
            top: 7px;
            right: 28px;
            background: #ff4e4e;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 999px;
        }

        .badge.pulse {
            animation: pulseBadge 1.4s infinite;
        }

        @keyframes pulseBadge {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,78,78,0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(255,78,78,0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,78,78,0); }
        }
    </style>
</head>
<body>

<!-- ===== 헤더 ===== -->
<div class="trade-header">
    <div class="header-left">
        <a th:href="@{/}" class="logo" style="margin-right: 10px;">더쿠쿠</a>
        <a th:href="@{/trade/list.do}" class="logo">굿즈거래</a>
    </div>
</div>

<!-- ===== 검색 (예전 카테고리 자리) ===== -->
<div class="trade-filter">
    <form class="trade-search-form" th:action="@{/trade}" method="get">
        <input type="text"
               name="keyword"
               class="trade-search-input"
               placeholder="굿즈명, 제목, 지역 검색"
               th:value="${keyword}">
        <button type="submit" class="trade-search-button">검색</button>
    </form>
</div>

<!-- 🔥 판매자 전용 리스트일 때만 안내 문구 표시 -->
<div th:if="${sellerName != null}"
     style="padding: 8px 18px 0; font-size: 13px; color: var(--text-sub);">
    <span th:text="${sellerName}">판매자</span> 님의 판매 상품
</div>

<!-- ===== LIST ===== -->
<div class="trade-list">

    <div class="trade-card"
         th:each="post : ${page.content}"
         th:onclick="|location.href='/trade/${post.id}/article/detail.do'|">

        <!-- 썸네일 -->
        <img class="trade-thumb"
             th:src="${post.thumbnailUrl != null ? post.thumbnailUrl : '/images/dummy/noimg.png'}" />

        <!-- 내용 -->
        <div class="trade-info">
            <div>
                <div class="trade-title" th:text="${post.title}">상품 제목</div>

                <!-- 🔥 판매자 닉네임 + 지역 + 시간 -->
                <div class="trade-meta">
                    <a th:href="@{|/trade/seller/${post.sellerId}|}"
                       th:text="${post.sellerNickname}"
                       style="font-weight:600;">
                        판매자
                    </a>
                    · <span th:text="${post.region}"></span>
                    · <span th:text="${post.timeAgo}"></span>
                </div>

                <!-- ❤️ 찜 · 💬 채팅 · 👀 조회 순서 -->
                <div class="trade-stats">
                    ♥ <span th:text="${post.likeCount}">0</span> 찜 ·
                    💬 <span th:text="${post.chatCount}">0</span> 채팅 ·
                    👀 <span th:text="${post.viewCount}">0</span> 조회
                </div>
            </div>

            <div class="trade-price"
                 th:text="${post.priceText}">
                가격
            </div>
        </div>
    </div>

</div>

<!-- ===== 글쓰기 버튼 ===== -->
<!-- ✅ 로그인한 경우: 로그인한 유저 id로 write 이동 -->
<a th:if="${session.loginMember != null}"
   th:href="@{|/trade/${session.loginMember.id}/write|}"
   class="write-btn">
    + 글쓰기
</a>

<!-- ✅ 비로그인인 경우: 로그인 페이지로 -->
<a th:if="${session.loginMember == null}"
   th:href="@{/login}"
   class="write-btn">
    + 글쓰기
</a>

<!-- ===== 하단 네비 ===== -->
<nav class="bottom-nav">

    <a href="/trade/list.do" class="nav-item" data-page="home">
        <span class="icon">🏠</span>
        홈
    </a>

    <a href="/chat/list" class="nav-item" data-page="chat">
        <span class="icon">💬</span>
        채팅방
        <span class="badge pulse" id="chatBadge">3</span>
    </a>

    <a href="/mypage" class="nav-item" data-page="mypage">
        <span class="icon">👤</span>
        내정보
    </a>

</nav>

<!-- ================= 하단 JS (기존 네비/뱃지 + 새 글 실시간) ================= -->
<script>
    (function () {

        const nav = document.querySelector(".bottom-nav");
        const items = nav.querySelectorAll(".nav-item");
        const badge = document.getElementById("chatBadge");
        const STORAGE_KEY = "duckuku_unread_msg";

        /* --- 활성화 페이지 자동 감지 --- */
        const pathname = window.location.pathname;

        let active = "home";
        if (pathname.startsWith("/chat")) active = "chat";
        else if (pathname.startsWith("/mypage")) active = "mypage";

        items.forEach(i => {
            if (i.dataset.page === active) i.classList.add("active");
        });

        /* --- 뱃지 저장된 unread 여부 확인 --- */
        const unread = localStorage.getItem(STORAGE_KEY);

        if (unread === "0" && badge) {
            badge.style.display = "none";
        }

        /* --- 채팅 클릭하면 읽음 처리 --- */
        const chatItem = document.querySelector('.nav-item[data-page="chat"]');
        if (chatItem) {
            chatItem.addEventListener("click", () => {
                if (badge) badge.style.display = "none";
                localStorage.setItem(STORAGE_KEY, "0");
            });
        }

    })();
</script>

<!-- 🔥 새 게시글 / 새 채팅방 실시간 반영용 WebSocket 구독 -->
<script>
    (function () {
        const socket = new SockJS("/ws-chat");      // WebSocketConfig endpoint
        const stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {

            /* 📌 1) 새 게시글 올라왔을 때 (이미 있던 기능) */
            stompClient.subscribe("/sub/trade.list", function (msg) {
                console.log("📢 새 게시글 알림 도착:", msg.body);
                location.reload();   // 새 글 보려고 전체 리로드
            });

            /* 📌 2) 새 채팅방 생겼을 때 (채팅 수 실시간 반영) */
            stompClient.subscribe("/sub/trade.chat", function (msg) {
                console.log("💬 새 채팅방 알림 도착:", msg.body);
                location.reload();   // 채팅 수, 찜 수, 조회수 다시 불러오기
            });
        });
    })();
</script>

</body>
</html>
