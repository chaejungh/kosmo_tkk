<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${post.id} == null ? '굿즈 거래 글쓰기 | 더쿠쿠' : '굿즈 거래 글 수정 | 더쿠쿠'">
        굿즈 거래 글쓰기 | 더쿠쿠
    </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <style>
        :root {
            --purple: #6366f1;
            --purple-deep: #4f46e5;
            --bg-soft: #f9fafb;
            --border: #e5e7eb;
            --text-main: #111827;
            --text-sub: #6b7280;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg-soft);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
        }

        .page {
            max-width: 900px;
            margin: 0 auto;
            padding: 16px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .form-card {
            background: #fff;
            border-radius: 16px;
            padding: 18px 20px 20px;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.06);
        }

        .field { margin-bottom: 14px; }

        .field-label {
            font-size: 13px;
            margin-bottom: 4px;
            color: var(--text-sub);
        }

        .field-input,
        .field-select,
        .field-textarea {
            width: 100%;
            border-radius: 10px;
            border: 1px solid var(--border);
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
        }

        .field-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .field-input:focus,
        .field-select:focus,
        .field-textarea:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 1px rgba(99,102,241,0.18);
        }

        .submit-wrap {
            margin-top: 18px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .btn-main,
        .btn-sub {
            border-radius: 999px;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .btn-main {
            background: var(--purple);
            color: #fff;
        }

        .btn-main:hover { background: var(--purple-deep); }

        .btn-sub {
            background: #fff;
            color: var(--text-main);
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="page">
    <h1 th:text="${post.id} == null ? '굿즈 거래 글쓰기' : '굿즈 거래 글 수정'"></h1>

    <!-- 🔥 post 객체와 바인딩 -->
    <form th:action="@{|/trade/${memberId}/write|}"
          th:object="${post}"
          method="post"
          enctype="multipart/form-data"
          class="form-card">

        <!-- ✅ 수정 모드일 때 기존 글 id 를 보내주는 hidden 필드 (진짜 중요!!) -->
        <input type="hidden" th:field="*{id}"/>

        <!-- 제목 -->
        <div class="field">
            <div class="field-label">제목</div>
            <input type="text" class="field-input"
                   th:field="*{title}"
                   placeholder="제목을 입력해주세요"/>
        </div>

        <!-- 굿즈명 -->
        <div class="field">
            <div class="field-label">굿즈명</div>
            <input type="text" class="field-input"
                   th:field="*{goodsName}"
                   placeholder="예) 나루토 아크릴 키링"/>
        </div>

        <!-- 가격 -->
        <div class="field">
            <div class="field-label">가격</div>
            <input type="number" class="field-input"
                   th:field="*{price}"
                   placeholder="숫자만 입력(원)"/>
        </div>

        <!-- 지역 -->
        <div class="field">
            <div class="field-label">거래 지역</div>
            <input type="text" class="field-input"
                   th:field="*{region}"
                   placeholder="예) 서울 금천구 독산동"/>
        </div>

        <!-- 카테고리 -->
        <div class="field">
            <div class="field-label">카테고리</div>
            <input type="text" class="field-input"
                   th:field="*{category}"
                   placeholder="예) 피규어, 키링, 잡화 등"/>
        </div>

        <!-- 거래 타입 -->
        <div class="field">
            <div class="field-label">거래 타입</div>
            <select class="field-select" th:field="*{tradeType}">
                <option value="SELL">SELL (판매)</option>
                <option value="BUY">BUY (삽니다)</option>
            </select>
        </div>

        <!-- 거래 방식 -->
        <div class="field">
            <div class="field-label">거래 방식</div>
            <select class="field-select" th:field="*{tradeMethod}">
                <option value="DIRECT">직거래</option>
                <option value="DELIVERY">택배</option>
                <option value="BOTH">직거래/택배 모두</option>
            </select>
        </div>

        <!-- 내용 -->
        <div class="field">
            <div class="field-label">내용</div>
            <textarea class="field-textarea"
                      th:field="*{content}"
                      placeholder="상세 설명을 적어주세요."></textarea>
        </div>

        <!-- 이미지 -->
        <div class="field">
            <div class="field-label">이미지</div>
            <input type="file" name="images" class="field-input" multiple/>
            <div style="margin-top:4px; font-size:12px; color:var(--text-sub);">
                수정 시 이미지를 다시 올리지 않으면 기존 이미지는 그대로 유지됩니다.
            </div>
        </div>

        <div class="submit-wrap">
            <button type="button" class="btn-sub" onclick="history.back();">취소</button>
            <button type="submit" class="btn-main"
                    th:text="${post.id} == null ? '등록하기' : '수정 완료'"></button>
        </div>
    </form>
</div>

</body>
</html>
