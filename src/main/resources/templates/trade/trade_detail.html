<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${trade.title} + ' | 굿즈거래 | 더쿠쿠'">굿즈거래 상세 | 더쿠쿠</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <style>
        :root {
            --purple: #6366f1;
            --purple-deep: #4f46e5;
            --bg-soft: #f9fafb;
            --border: #e5e7eb;
            --text-main: #111827;
            --text-sub: #6b7280;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg-soft);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ===== 상단 바 ===== */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: #ffffff;
            border-bottom: 1px solid var(--border);
        }

        .top-bar-inner {
            max-width: 1040px;
            margin: 0 auto;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            border: none;
            background: transparent;
            font-size: 18px;
            cursor: pointer;
        }

        .top-title {
            font-size: 16px;
            font-weight: 600;
        }

        /* ===== 전체 페이지 ===== */
        .detail-page {
            max-width: 1040px;
            margin: 0 auto;
            padding: 16px;
        }

        .detail-layout {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        @media (min-width: 900px) {
            .detail-layout {
                display: grid;
                grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
                gap: 32px;
                align-items: flex-start;
            }
        }

        /* ===== 이미지 영역 ===== */
        .image-box {
            background: #ffffff;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.06);
        }

        .image-frame {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #f3f4f6;
        }

        .image-frame img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            max-height: 460px;
            margin: 0 auto;
        }

        /* ===== 오른쪽 정보 카드 ===== */
        .info-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 18px 20px 20px;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.06);
        }

        .title {
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .meta {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        /* 🔹 좋아요 / 채팅 / 조회수 라인 */
        .stats-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 16px;
        }

        .like-form {
            margin: 0;
        }

        .like-btn {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            padding: 0;
        }

        .like-btn.liked {
            color: #ef4444; /* 빨간 하트 */
        }

        .price {
            font-size: 22px;
            font-weight: 800;
            color: var(--purple);
            margin-bottom: 16px;
        }

        /* ===== 상태 뱃지 ===== */
        .status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-onsale {
            background: rgba(99, 102, 241, 0.1);
            color: var(--purple-deep);
        }

        .badge-reserved {
            background: rgba(251, 191, 36, 0.1);
            color: #d97706;
        }

        .badge-sold {
            background: #e5e7eb;
            color: #4b5563;
        }

        /* ===== 설명 ===== */
        .desc-box {
            margin-top: 12px;
            padding: 12px 14px;
            border-radius: 12px;
            background: #f9fafb;
            font-size: 14px;
            line-height: 1.6;
        }

        /* ===== 판매자 ===== */
        .seller-card {
            padding-bottom: 12px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .seller-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #eef2ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .seller-info-main {
            flex: 1;
        }

        .seller-name {
            font-size: 14px;
            font-weight: 600;
        }

        .seller-region {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 2px;
        }

        /* ===== 버튼 ===== */
        .button-wrap {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-main,
        .btn-sub {
            border-radius: 999px;
            padding: 14px 18px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .btn-main {
            background: var(--purple);
            color: #ffffff;
        }

        .btn-main:hover {
            background: var(--purple-deep);
        }

        .btn-sub {
            background: #ffffff;
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        @media (min-width: 768px) {
            .button-wrap {
                flex-direction: row;
            }

            .btn-main,
            .btn-sub {
                flex: 1;
            }
        }

        /* ===== 라벨 ===== */
        .label-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 4px;
            font-size: 12px;
            color: var(--text-sub);
        }

        .label-chip {
            padding: 2px 8px;
            border-radius: 999px;
            background: #f3f4f6;
        }
    </style>
</head>
<body>

<header class="top-bar">
    <div class="top-bar-inner">
        <button class="back-btn" type="button" onclick="history.back()">←</button>
        <div class="top-title">굿즈거래</div>
    </div>
</header>

<main class="detail-page">

    <section class="detail-layout">

        <!-- 🔥 대표 이미지 -->
        <div class="image-box">
            <div class="image-frame">
                <img th:src="${coverUrl}"
                     th:onclick="'location.href=\'/trade/' + ${trade.id} + '/article/' + ${coverImageId} + '/detail.do\''"
                     style="cursor:pointer;"
                     alt="굿즈 이미지"/>
            </div>
        </div>

        <!-- 오른쪽 정보 -->
        <div class="info-card">

            <!-- 🔼 프로필 카드 (닉네임 클릭 → 판매자 리스트로 이동) -->
            <div class="seller-card">
                <div class="seller-avatar"><span>👤</span></div>

                <div class="seller-info-main">
                    <div class="seller-name">
                        <a th:href="@{|/trade/seller/${sellerId}|}"
                           th:text="${trade.seller != null ? trade.seller.nickname : '판매자 #' + trade.sellerId}">
                            판매자
                        </a>
                    </div>

                    <div class="seller-region"
                         th:text="${trade.region != null ? trade.region : '지역 미등록'}"></div>
                </div>
            </div>

            <!-- 글 제목 -->
            <h1 class="title" th:text="${trade.title}"></h1>

            <!-- 등록일 -->
            <div class="meta">
                <span th:text="${#temporals.format(trade.createdAt, 'MM/dd')} + ' 등록'"></span>
            </div>

            <!-- 🔹 좋아요 / 채팅 / 조회수 + 토글 하트 -->
            <div class="stats-row">

                <!-- 빈 하트 (아직 찜 안함) -->
                <form class="like-form"
                      th:if="${!liked}"
                      th:action="@{|/trade/${currentMemberId}/BookMark|}"
                      method="post">
                    <input type="hidden" name="tradeId" th:value="${trade.id}">
                    <button type="submit" class="like-btn">♡</button>
                </form>

                <!-- 빨간 하트 (이미 찜한 상태) -->
                <form class="like-form"
                      th:if="${liked}"
                      th:action="@{|/trade/${currentMemberId}/BookMarkDelete|}"
                      method="post">
                    <input type="hidden" name="tradeId" th:value="${trade.id}">
                    <button type="submit" class="like-btn liked">♥</button>
                </form>

                <span>
                    <span th:text="${likeCount}">0</span> 찜 ·
                    💬 <span th:text="${chatCount}">0</span> 채팅 ·
                    조회 <span th:text="${trade.viewCount != null ? trade.viewCount : 0}">0</span>
                </span>
            </div>

            <!-- 가격 -->
            <div class="price"
                 th:text="${#numbers.formatInteger(trade.price, 0, 'COMMA')} + '원'"></div>

            <div class="status-row">
                <span class="status-badge"
                      th:classappend="${statusClass}"
                      th:text="${statusLabel}"></span>

                <div class="label-row">
                    <span class="label-chip" th:text="${trade.category}"></span>
                    <span class="label-chip" th:text="${trade.tradeType}"></span>
                    <span class="label-chip" th:text="${trade.tradeMethod}"></span>
                </div>
            </div>

            <!-- ✅ 상태 변경 버튼 (내 글일 때만 노출) -->
            <div th:if="${currentMemberId == sellerId}"
                 style="margin-top:8px; display:flex; gap:8px; flex-wrap:wrap;">

                <form th:action="@{|/trade/${trade.id}/status|}" method="post" style="margin:0;">
                    <input type="hidden" name="status" value="ON_SALE"/>
                    <button type="submit" class="btn-sub"
                            style="padding:8px 12px; font-size:12px;">판매중</button>
                </form>

                <form th:action="@{|/trade/${trade.id}/status|}" method="post" style="margin:0;">
                    <input type="hidden" name="status" value="RESERVED"/>
                    <button type="submit" class="btn-sub"
                            style="padding:8px 12px; font-size:12px;">예약중</button>
                </form>

                <form th:action="@{|/trade/${trade.id}/status|}" method="post" style="margin:0;">
                    <input type="hidden" name="status" value="SOLD"/>
                    <button type="submit" class="btn-sub"
                            style="padding:8px 12px; font-size:12px;">거래완료</button>
                </form>
            </div>

            <div class="desc-box" th:text="${trade.content}"></div>

            <!-- 채팅 / (내 글일 때만) 수정 · 삭제 -->
            <div class="button-wrap">

                <!-- ✅ 누구나 채팅 가능 -->
                <form th:action="@{|/trade/${trade.id}/chat/start/${currentMemberId}|}"
                      method="post" style="flex:1; margin:0;">
                    <button type="submit" class="btn-main">채팅하기</button>
                </form>

                <!-- ✅ 내가 쓴 글일 때만 수정 / 삭제 버튼 노출 -->
                <div th:if="${currentMemberId == sellerId}"
                     style="display:flex; gap:8px; flex:1;">

                    <!-- ✏ 수정하기 → 기존 write 폼 재사용 -->
                    <form th:action="@{|/trade/${currentMemberId}/write?tradeId=${trade.id}|}"
                          method="get"
                          style="flex:1; margin:0;">
                        <button type="submit" class="btn-sub">수정하기</button>
                    </form>

                    <!-- 🗑 삭제하기 -->
                    <form th:action="@{|/trade/${trade.id}/delete|}"
                          method="post"
                          style="flex:1; margin:0;"
                          onsubmit="return confirm('정말 이 게시글을 삭제할까요?');">
                        <button type="submit" class="btn-sub">삭제하기</button>
                    </form>
                </div>

            </div>

        </div>
    </section>

</main>

</body>
</html>
