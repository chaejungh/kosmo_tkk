<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${trade.title} + ' | 굿즈거래 | 더쿠쿠'">굿즈거래 상세 | 더쿠쿠</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <style>
        :root {
            --purple: #6366f1;
            --purple-deep: #4f46e5;
            --bg-soft: #f9fafb;
            --border: #e5e7eb;
            --text-main: #111827;
            --text-sub: #6b7280;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg-soft);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ===== 상단 바 ===== */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: #ffffff;
            border-bottom: 1px solid var(--border);
        }

        .top-bar-inner {
            max-width: 1040px;
            margin: 0 auto;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            border: none;
            background: transparent;
            font-size: 18px;
            cursor: pointer;
        }

        .top-title {
            font-size: 16px;
            font-weight: 600;
        }

        /* ===== 전체 페이지 ===== */
        .detail-page {
            max-width: 1040px;
            margin: 0 auto;
            padding: 16px;
        }

        .detail-layout {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        @media (min-width: 900px) {
            .detail-layout {
                display: grid;
                grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
                gap: 32px;
                align-items: flex-start;
            }
        }

        /* ===== 이미지 영역 ===== */
        .image-box {
            background: #ffffff;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.06);
        }

        .image-frame {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #f3f4f6;
        }

        .image-frame img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            max-height: 460px;
            margin: 0 auto;
        }

        /* ===== 오른쪽 정보 카드 ===== */
        .info-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 18px 20px 20px;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.06);
        }

        .title {
            font-size: 19px;
            font-weight: 700;
            margin: 8px 0 6px;
        }

        .price {
            font-size: 22px;
            font-weight: 800;
            color: var(--purple);
            margin-bottom: 10px;
        }

        .meta {
            font-size: 13px;
            color: var(--text-sub);
            margin: 6px 0 10px;
        }

        /* ===== 판매자 카드 ===== */
        .seller-card {
            padding-bottom: 12px;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .seller-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #eef2ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .seller-info-main {
            flex: 1;
        }

        .seller-name {
            font-size: 14px;
            font-weight: 600;
        }

        .seller-region {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 2px;
        }

        /* ===== 상태 / 라벨 ===== */
        .status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-onsale {
            background: rgba(99, 102, 241, 0.1);
            color: var(--purple-deep);
        }

        .badge-reserved {
            background: rgba(251, 191, 36, 0.1);
            color: #d97706;
        }

        .badge-sold {
            background: #e5e7eb;
            color: #4b5563;
        }

        .label-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 12px;
            color: var(--text-sub);
        }

        .label-chip {
            padding: 2px 8px;
            border-radius: 999px;
            background: #f3f4f6;
        }

        /* ===== 설명 ===== */
        .desc-box {
            margin-top: 10px;
            padding: 12px 14px;
            border-radius: 12px;
            background: #f9fafb;
            font-size: 14px;
            line-height: 1.6;
        }

        /* 🔹 좋아요 / 채팅 / 조회수 라인 */
        .stats-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-sub);
            margin-top: 10px;
        }

        .like-form {
            margin: 0;
        }

        .like-btn {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            padding: 0;
        }

        .like-btn.liked {
            color: #ef4444;
        }

        /* ===== 상태 변경 버튼 (판매자만) ===== */
        .status-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .status-actions .btn-status {
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: #fff;
            font-size: 12px;
            cursor: pointer;
        }

        /* ===== 버튼 영역 ===== */
        .button-wrap {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-main {
            border-radius: 999px;
            padding: 14px 18px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            background: var(--purple);
            color: #ffffff;
            width: 100%;
        }

        .btn-main:hover {
            background: var(--purple-deep);
        }

        /* ===== 더보기(수정/삭제) ===== */
        .more-wrapper {
            align-self: flex-end;
            position: relative;
        }

        .more-btn {
            border-radius: 999px;
            border: 1px solid var(--border);
            background: #ffffff;
            padding: 8px 14px;
            font-size: 14px;
            cursor: pointer;
        }

        .more-menu {
            position: absolute;
            right: 0;
            top: 40px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
            padding: 6px;
            min-width: 120px;
            display: none;
            z-index: 30;
        }

        .more-menu.open {
            display: block;
        }

        .more-menu form {
            margin: 0;
        }

        .more-menu button {
            width: 100%;
            border: none;
            background: transparent;
            padding: 8px 10px;
            font-size: 14px;
            text-align: left;
            cursor: pointer;
        }

        .more-menu button:hover {
            background: #f3f4f6;
        }

        .more-menu button.delete {
            color: #ef4444;
        }
    </style>
</head>
<body>

<header class="top-bar">
    <div class="top-bar-inner">
        <button class="back-btn" type="button" onclick="history.back()">←</button>
        <div class="top-title">굿즈거래</div>
    </div>
</header>

<main class="detail-page">

    <section class="detail-layout">

        <!-- 🔥 대표 이미지 -->
        <div class="image-box">
            <div class="image-frame">
                <img th:src="${coverUrl}"
                     th:onclick="'location.href=\'/trade/' + ${trade.id} + '/article/' + ${coverImageId} + '/detail.do\''"
                     style="cursor:pointer;"
                     alt="굿즈 이미지"/>
            </div>
        </div>

        <!-- 오른쪽 정보 -->
        <div class="info-card">

            <!-- 👤 판매자 카드 -->
            <div class="seller-card">
                <div class="seller-avatar"><span>👤</span></div>

                <div class="seller-info-main">
                    <div class="seller-name">
                        <a th:href="@{|/trade/seller/${sellerId}|}"
                           th:text="${trade.seller != null ? trade.seller.nickname : '판매자 #' + trade.sellerId}">
                            판매자
                        </a>
                    </div>
                    <!-- 닉네임 아래 한 줄 설명 (지금은 그대로 둠) -->
                    <div class="seller-region"
                         th:text="${trade.seller != null && trade.seller.intro != null ? trade.seller.intro : ''}">
                    </div>
                </div>
            </div>

            <!-- 제목 -->
            <h1 class="title" th:text="${trade.title}">제목</h1>

            <!-- 가격 -->
            <div class="price"
                 th:text="${#numbers.formatInteger(trade.price, 0, 'COMMA')} + '원'">0원</div>

            <!-- 상태 / 카테고리 / 거래방식 -->
            <div class="status-row">
                <span class="status-badge"
                      th:classappend="${statusClass}"
                      th:text="${statusLabel}">
                    판매중
                </span>

                <div class="label-row">
                    <!-- 카테고리(있을 때만) -->
                    <span class="label-chip"
                          th:if="${trade.category != null}"
                          th:text="${trade.category}">
                        카테고리
                    </span>

                    <!-- 거래 타입 (SELL/BUY/EXCHANGE → 한글) -->
                    <span class="label-chip"
                          th:text="${trade.tradeType == 'SELL' ? '판매' :
                                   (trade.tradeType == 'BUY' ? '삽니다' :
                                   (trade.tradeType == 'EXCHANGE' ? '교환' : trade.tradeType))}">
                        거래타입
                    </span>

                    <!-- 거래 방식 (DIRECT/DELIVERY → 한글) -->
                    <span class="label-chip"
                          th:text="${trade.tradeMethod == 'DIRECT' ? '직거래' :
                                   (trade.tradeMethod == 'DELIVERY' ? '택배거래' : trade.tradeMethod)}">
                        거래방식
                    </span>
                </div>
            </div>

            <!-- 등록 시간 + 지역 (상대시간 + 지역) -->
            <div class="meta">
                <span th:text="(timeAgo != null ? timeAgo : '등록 시간 없음')
                               + ' · '
                               + (trade.region != null ? trade.region : '지역 미등록')">
                    5분 전 · 서울 강남구
                </span>
            </div>

            <!-- 내용 -->
            <div class="desc-box" th:text="${trade.content}">내용</div>

            <!-- 🔥 판매자만 보는 상태 변경 버튼 -->
            <div class="status-actions" th:if="${currentMemberId == sellerId}">
                <form th:action="@{|/trade/${trade.id}/status|}" method="post">
                    <input type="hidden" name="status" value="ON_SALE"/>
                    <button type="submit" class="btn-status">판매중</button>
                </form>
                <form th:action="@{|/trade/${trade.id}/status|}" method="post">
                    <input type="hidden" name="status" value="RESERVED"/>
                    <button type="submit" class="btn-status">예약중</button>
                </form>
                <form th:action="@{|/trade/${trade.id}/status|}" method="post">
                    <input type="hidden" name="status" value="SOLD"/>
                    <button type="submit" class="btn-status">거래완료</button>
                </form>
            </div>

            <!-- ♡ 찜 / 채팅 / 조회수 -->
            <div class="stats-row">

                <!-- 빈 하트 -->
                <form class="like-form"
                      th:if="${!liked}"
                      th:action="@{|/trade/${currentMemberId}/BookMark|}"
                      method="post">
                    <input type="hidden" name="tradeId" th:value="${trade.id}">
                    <button type="submit" class="like-btn">♡</button>
                </form>

                <!-- 빨간 하트 -->
                <form class="like-form"
                      th:if="${liked}"
                      th:action="@{|/trade/${currentMemberId}/BookMarkDelete|}"
                      method="post">
                    <input type="hidden" name="tradeId" th:value="${trade.id}">
                    <button type="submit" class="like-btn liked">♥</button>
                </form>

                <span>
                    <span th:text="${likeCount}">0</span> 찜 ·
                    💬 <span th:text="${chatCount}">0</span> 채팅 ·
                    조회 <span th:text="${trade.viewCount != null ? trade.viewCount : 0}">0</span>
                </span>
            </div>

            <!-- 채팅 + 더보기(수정/삭제) -->
            <div class="button-wrap">

                <!-- 누구나 채팅 가능 -->
                <form th:action="@{|/trade/${trade.id}/chat/start/${currentMemberId}|}"
                      method="post" style="margin:0;">
                    <button type="submit" class="btn-main">채팅하기</button>
                </form>

                <!-- 판매자만 수정/삭제 more 메뉴 -->
                <div class="more-wrapper" th:if="${currentMemberId == sellerId}">
                    <button type="button" class="more-btn" id="moreToggle">⋮</button>

                    <div class="more-menu" id="moreMenu">
                        <!-- 수정하기 -->
                        <form th:action="@{|/trade/${currentMemberId}/write?tradeId=${trade.id}|}"
                              method="get">
                            <button type="submit">수정하기</button>
                        </form>
                        <!-- 삭제하기 -->
                        <form th:action="@{|/trade/${trade.id}/delete|}"
                              method="post"
                              onsubmit="return confirm('정말 이 게시글을 삭제할까요?');">
                            <button type="submit" class="delete">삭제하기</button>
                        </form>
                    </div>
                </div>

            </div>

        </div>
    </section>

</main>

<script>
    // … 메뉴 토글
    (function () {
        const btn = document.getElementById("moreToggle");
        const menu = document.getElementById("moreMenu");
        if (!btn || !menu) return;

        btn.addEventListener("click", function (e) {
            e.stopPropagation();
            menu.classList.toggle("open");
        });

        document.addEventListener("click", function () {
            menu.classList.remove("open");
        });
    })();
</script>

</body>
</html>
